# CodeRabbit configuration for openfga/go-sdk
# See https://docs.coderabbit.ai for configuration reference

language: "en-US"

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true

  path_filters:
    - "!docs/**"           # Auto-generated API reference docs
    - "!**/.openapi-generator/**"

  path_instructions:
    - path: "model_*.go"
      instructions: |
        This file is auto-generated by OpenAPI Generator (https://openapi-generator.tech) and will be wiped on regeneration.

        Contributors may modify generated files, but changes must be sourced from sdk-generator:
        1. Check the PR description for a linked https://github.com/openfga/sdk-generator PR
        2. If a linked sdk-generator PR exists, verify it is the source of these changes
        3. If NO linked sdk-generator PR exists, request the contributor submit one and link it in this PR

        Do not merge changes to model_*.go without a linked sdk-generator PR.

    - path: "api_open_fga.go"
      instructions: |
        This file is auto-generated by OpenAPI Generator and will be wiped on regeneration. It is also deprecated in favor of api_executor.go.

        Contributors may modify this file, but:
        1. New functionality should go in api_executor.go (hand-written, preferred pattern)
        2. Changes here must have a linked https://github.com/openfga/sdk-generator PR
        3. If no linked sdk-generator PR exists, request the contributor submit one

        Do not merge changes without a linked sdk-generator PR.

    - path: "internal/constants/constants.go"
      instructions: |
        This file is auto-generated and will be wiped on regeneration.

        Contributors may modify this file, but changes must be sourced from sdk-generator:
        1. Check the PR description for a linked https://github.com/openfga/sdk-generator PR
        2. If no linked sdk-generator PR exists, request the contributor submit one
        3. Do not merge without a linked sdk-generator PR

    - path: "streaming.go"
      instructions: |
        This file is auto-generated by OpenAPI Generator and will be wiped on regeneration.

        Contributors may modify this file, but changes must have a linked https://github.com/openfga/sdk-generator PR. If none exists, request the contributor submit one.

    - path: "client/**"
      instructions: |
        High-level SDK client wrapper — review this carefully.

        Check for:
        1. Correct handling of BatchCheck request splitting:
           - Max 50 tuples per batch (constant ClientMaxBatchSize)
           - Max 10 parallel requests (constant ClientMaxMethodParallelRequests)
           - Proper batching logic if splitting requests

        2. Proper StreamingChannel usage:
           - Both Results AND Errors channels must be drained (goroutine leak prevention)
           - Channels should be used with select statements, never just `for ... range`
           - Context cancellation should be respected
           - channel.Close() should be deferred

        3. Credential propagation:
           - ClientConfiguration.Credentials properly passed through to APIClient
           - OAuth2 token injection working correctly
           - No secrets logged in debug output

        4. Error handling:
           - Retryable errors (429, 5xx) not caught and rethrown
           - Authentication errors (401, 403) handled separately
           - Client errors (4xx) not retried

        5. Telemetry:
           - New public API methods MUST set OperationName in APIExecutorRequest and flow through the executor for telemetry
           - New methods must be added to the SdkClient interface in client/client.go
           - Metrics recorded for method duration
           - Attributes correctly populated (store_id, method, etc.)
           - No PII in metric attributes

        6. API conventions:
           - Fluent API pattern: Method(ctx).Body(...).Options(...).Execute()
           - All public methods accept context.Context as first parameter
           - Validate StoreId and AuthorizationModelId as ULIDs
           - Use openfga.ToPtr[T]() for optional fields (PtrString/PtrBool/PtrInt are deprecated)

    - path: "oauth2/**"
      instructions: |
        Security-sensitive: OAuth2 token lifecycle and credential management.

        Review for:
        1. Token expiry handling:
           - Threshold (300s) and jitter (300s) preserved — do not remove jitter
           - Tokens refresh 5-10 min before expiry (expected behavior)
           - No time-based assumptions about token validity

        2. RoundTripper implementation:
           - Bearer tokens correctly injected in Authorization header
           - Format: "Authorization: Bearer <token>"
           - All requests use the custom transport

        3. Security:
           - No secrets or tokens logged or returned in error messages
           - HTTP client properly configured
           - Token provider handles errors gracefully

        4. Test coverage:
           - Token refresh scenarios tested
           - Token expiry scenarios tested
           - NO time-dependent test assertions
           - Use mocks for token provider, not real timings

    - path: "credentials/**"
      instructions: |
        Credential configuration and injection.

        Check for:
        1. Credential types:
           - All three types handled: none, api_token, client_credentials
           - Switch statements cover all cases
           - New credential types added to switch statements

        2. No secrets leakage:
           - Credentials not logged
           - Error messages do not include tokens or secrets
           - Debug output excludes sensitive fields

        3. HTTP client injection:
           - Custom RoundTripper properly wired for OAuth2
           - Credentials flow to APIClient correctly
           - Default HTTP client used if no custom client provided

        4. Context handling:
           - Context passed correctly to credential operations
           - Token refresh respects context cancellation
           - Timeouts applied appropriately

    - path: "telemetry/**"
      instructions: |
        OpenTelemetry instrumentation — check metric patterns.

        Review for:
        1. Metric naming:
           - All metrics follow fga_client_* naming convention
           - Counter, histogram names are lowercase with underscores
           - No duplicate metric definitions

        2. Attribute cardinality:
           - High-cardinality attributes (e.g., url_full, unique per-request IDs) MUST be disabled by default in DefaultTelemetryConfiguration() — some providers charge heavily for high cardinality
           - No PII (user IDs, tokens, request bodies) in attributes
           - Attributes are optional and user-configurable

        3. Test setup:
           - Tests use noop.NewMeterProvider() not live exporters
           - No external metric exports in unit tests

        4. New metrics:
           - Added to telemetry/configuration.go as MetricConfiguration
           - Method added to telemetry/metrics.go
           - Attribute definitions added in telemetry/attributes.go if needed
           - Tests use noop provider
           - Changes/additions to metrics MUST be called out in the changelog

    - path: "internal/utils/retryutils/**"
      instructions: |
        Retry backoff and header parsing.

        Check for:
        1. Exponential backoff:
           - Backoff formula correct: 2^n * minWait with jitter
           - Jitter applied between min and max backoff
           - Backoff capped at 120 seconds (MaxBackoffTimeInSec)

        2. Retry-After header:
           - Parsed correctly (seconds or HTTP-date format)
           - Capped at 1800 seconds (RetryHeaderMaxAllowableDurationInSec)
           - Checked before exponential backoff
           - Header sources: Retry-After, X-RateLimit-Reset, X-Rate-Limit-Reset

        3. No retry logic changes:
           - Do not weaken retry-after header respect
           - Do not bypass exponential backoff
           - Do not remove jitter (it prevents thundering herd)

        4. Constants:
           - All constants use internal/constants/constants.go values
           - No hardcoded retry limits or timeouts

    - path: "api_executor.go"
      instructions: |
        Hand-written request executor with retry logic. Preferred layer for new API methods (not api_open_fga.go).

        Check for:
        1. Retry correctness:
           - Only retry on 429 and 5xx — never 4xx client errors (except 429)
           - Exponential backoff with jitter
           - Respect Retry-After headers before falling back to exponential backoff

        2. HTTP safety:
           - Response bodies read and closed in all code paths including errors
           - Context cancellation propagated correctly
           - No resource leaks

        3. Telemetry:
           - recordTelemetry() called with correct OperationName and storeId
           - New methods flow through executor path for metric capture

    - path: "api_client.go"
      instructions: |
        Hand-written core HTTP client setup and lifecycle.

        Check for:
        1. No secrets or tokens logged in debug output
        2. Proper HTTP client lifecycle (connection pooling, timeouts)
        3. Response body closed in all code paths
        4. Thread safety — APIClient instances are shared across goroutines
        5. Correct User-Agent header construction

    - path: "**/*_test.go"
      instructions: |
        Test conventions:
        - t.Parallel() at both top-level test and inside t.Run() subtests
        - Table-driven tests with t.Run() for multiple cases
        - testify for assertions: require for fatal, assert for non-fatal
        - HTTP mocking via httpmock — never real network calls
        - httptest.NewServer for streaming/NDJSON tests
        - No hardcoded time.Sleep — use channels, contexts, or helpers
        - All test code must be race-safe (CI runs with -race)
        - No time-dependent assertions on token expiry — mock the token provider

    - path: "errors.go"
      instructions: |
        Error type definitions and retry eligibility.

        Check for:
        1. Error types:
           - All five types present: Generic, Authentication, Validation, NotFound, Internal, RateLimit
           - Each type has ShouldRetry() method if applicable
           - Error constructors populate all fields

        2. Retry eligibility:
           - FgaApiInternalError.ShouldRetry() returns false only for 501
           - FgaApiRateLimitExceededError.ShouldRetry() always returns true
           - Client errors (4xx) do not have ShouldRetry() (not retryable)

        3. Error context:
           - StoreId, RequestId, ResponseStatusCode available on all errors
           - Retry-After header parsed and exposed (internal/rate limit errors)
           - RequestBody included for debugging (not internal errors)

  auto_review:
    enabled: true
    drafts: false

knowledge_base:
  repo_info:
    path: "AGENTS.md"
  learnings:
    scope: repository
