name: Build, Test and Publish
permissions:
  contents: read

on:
  merge_group:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          cache-dependency-path: "./go.sum"
          check-latest: true
          go-version-file: "./go.mod"

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -coverprofile=coverage.txt -covermode=atomic -v ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: openfga/go-sdk

  lint-format:
    runs-on: ubuntu-latest
    name: Lint and Format Check
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          cache-dependency-path: "./go.sum"
          check-latest: true
          go-version-file: "./go.mod"

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.1

  govulncheck:
    runs-on: ubuntu-latest
    name: Run govulncheck
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - id: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          cache-dependency-path: "./go.sum"
          go-version-file:  "./go.mod"

  verify-version:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint-format]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify versions match
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          MANIFEST_VERSION=$(jq -r '.["."]' .release-please-manifest.json)
          GO_VERSION=$(grep 'x-release-please-version' internal/constants/constants.go | grep -oP '"\K[^"]+(?=")')

          echo "Tag: $TAG_VERSION | Manifest: $MANIFEST_VERSION | constants.go: $GO_VERSION"

          if [[ "$TAG_VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "ERROR: Tag version does not match manifest version"
            exit 1
          fi
          if [[ "$GO_VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "ERROR: constants.go version does not match manifest version"
            exit 1
          fi
          echo "All versions verified: $TAG_VERSION"

  undraft-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [verify-version]
    permissions:
      contents: write
    uses: openfga/.github/.github/workflows/undraft-release.yml@main
